<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loren's life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14140f;
    --surface: #233126;
    --surface-2: #4A1A23;
    --line: rgba(216,208,194,0.14);
    --text: #D8D0C2;
    --text-muted: #9CAB91;
    --bordeaux: #4A1A23;
    --hunter: #233126;
    --sage: #6A7657;
    --bone: #D8D0C2;
    --cedar: #8C603E;
    --menstrual: #BC4A5C;
    --folicular: var(--sage);
    --ovulatoria: var(--cedar);
    --lutea: var(--bone);
    --accent: var(--cedar);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  img, svg, input, textarea, select{ max-width: 100%; }
  .rit-row, .rit-row > span, .pocket-head, .el-head, label.rit-row, .grocery-list li, .grocery-list li > label, .meal-row{ min-width: 0; }
  .rit-item-name, .rit-item-desc, .gname, .meal-row, .debt-name, .plant-desc{ overflow-wrap: anywhere; word-break: break-word; }
  html,body{margin:0;padding:0; max-width:100%; overflow-x:hidden;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 18px 60px;
  }
  .wrap{max-width: 720px; margin: 0 auto;}

  .brand{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .brand-logo{ width: 38px; height: 38px; flex-shrink:0; color: var(--cedar); }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 34px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .nav{
    display:flex;
    gap: 6px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    overflow-x:auto;
  }
  .nav button{
    background:none;
    border:none;
    color: var(--text-muted);
    font-family:'Work Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .nav button.active{
    color: var(--text);
    border-bottom: 2px solid var(--accent);
    font-weight: 500;
  }
  .nav button:disabled{
    cursor: default;
    opacity: 0.45;
  }

  /* ---- Setup card ---- */
  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 20px;
  }
  .card h2{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 8px;
  }
  .card p.hint{
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 20px;
    line-height: 1.5;
  }
  label{
    display:block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field{margin-bottom: 18px;}
  input[type=date], input[type=number]{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Work Sans', sans-serif;
  }
  input:focus{outline: 2px solid var(--accent); outline-offset: 1px;}
  .btn{
    background: var(--accent);
    color: var(--bone);
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .btn.ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    font-weight: 500;
  }
  .row{display:flex; gap: 12px; flex-wrap: wrap; align-items:center;}
  @media (max-width: 420px){ .row{ flex-direction: column; align-items: stretch; } .row > *{ min-width: 0 !important; width: 100%; } }

  /* ---- Dial ---- */
  /* ---- Daily 3 columnas ---- */
  .daily-section{ margin-bottom: 18px; }
  .col-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display:block;
  }

  /* ---- Score semanal ---- */
  .score-bar{
    display:flex;
    gap:4px;
    margin: 10px 0 6px;
    align-items:flex-end;
  }
  .score-day{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  .score-day-bar{
    width:100%;
    background: var(--surface-2);
    border-radius: 4px 4px 0 0;
    transition: height 0.3s ease;
    min-height: 4px;
  }
  .score-day-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  .score-day-pts{
    font-family:'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  .score-day.today .score-day-bar{ background: var(--cedar); }
  .score-day.today .score-day-label, .score-day.today .score-day-pts{ color: var(--cedar); }
  .score-total{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
  }
  .score-recs{
    background: var(--surface-2);
    border-radius: 12px;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  /* ---- Gym tracker ---- */
  .gym-table{ width:100%; border-collapse:collapse; font-size: 12.5px; margin-top: 10px; }
  .gym-table th{ text-align:left; color: var(--text-muted); font-weight:500; font-size:11px; text-transform:uppercase; padding:4px 6px; border-bottom: 1px solid var(--line); }
  .gym-table td{ padding:6px 6px; border-bottom: 1px solid var(--line); vertical-align:middle; }
  .gym-table input[type=number]{ width: 52px; background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius:6px; padding:3px 6px; font-size:12px; text-align:center; }
  .gym-table input[type=checkbox]{ accent-color: var(--accent); width:15px; height:15px; }
  .gym-note{ font-family:'JetBrains Mono',monospace; font-size:9.5px; color: var(--cedar); }

  .intention-card{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.5;
    text-align: center;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 11px 14px;
    margin-bottom: 24px;
  }

  .dial-section{
    display:flex;
    flex-direction: column;
    align-items:center;
    text-align:center;
    margin-bottom: 30px;
  }
  .dial-wrap{position:relative; width: 188px; height: 188px;}
  .dial-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .moon-glyph{font-size: 24px; line-height:1;}
  .day-number{
    font-family:'JetBrains Mono', monospace;
    font-size: 23px;
    margin-top: 4px;
  }
  .day-total{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .phase-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    margin-top: 14px;
  }
  .phase-energy{
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
    max-width: 380px;
  }
  .settings-link{
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Elements grid ---- */
  .section-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .section-sub{
    color: var(--text-muted);
    font-size: 13px;
    margin: 0 0 18px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 520px){ .grid{grid-template-columns: 1fr;} }

  .el-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 11px;
    position: relative;
  }
  .el-head{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .glyph{width: 26px; height: 26px; flex-shrink:0;}
  .el-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
  }
  .el-sub{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .el-activity{
    font-size: 14.5px;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .check-row{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor:pointer;
  }
  .check-row input{accent-color: var(--accent);}
  .el-card.done{ border-color: var(--el-color); }

  textarea{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13.5px;
    resize: vertical;
    min-height: 64px;
    margin-top: 10px;
  }
  textarea:focus{outline: 2px solid var(--accent); outline-offset: 1px;}

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    opacity:0;
    transition: opacity 0.25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(15,12,22,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 10;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    max-width: 380px;
    width: 100%;
  }

  .loading{ color: var(--text-muted); font-size: 14px; padding: 40px 0; text-align:center; }

  /* ---- Rituales ---- */
  .rit-block{ margin-bottom: 22px; }
  .rit-head{
    display:flex;
    align-items:baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .rit-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
  }
  .rit-tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .rit-sub{ color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }

  .rit-group-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 0 10px;
  }
  .rit-group-label:first-child{ margin-top: 0; }

  .rit-item{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .rit-item.done{ border-color: var(--accent); }
  .rit-item.muted{ opacity: 0.5; }
  .rit-row{
    display:flex;
    align-items:flex-start;
    gap: 12px;
  }
  .rit-row input[type=checkbox]{
    margin-top: 2px;
    accent-color: var(--accent);
    width: 17px; height: 17px;
    flex-shrink:0;
  }
  .rit-item-name{ font-size: 13.5px; font-weight: 500; }
  .rit-item-desc{ font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

  .week-strip{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .week-day{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 4px;
    text-align:center;
  }
  .week-day.today{ border-color: var(--accent); }
  .week-day .wd-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .week-day .wd-task{ font-size: 10.5px; margin-top: 4px; line-height: 1.3; min-height: 26px; }

  .progress-bar{
    background: var(--surface-2);
    border-radius: 999px;
    height: 8px;
    overflow:hidden;
    margin: 10px 0 8px;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .quick-add{ display:flex; gap: 8px; flex-wrap:wrap; margin-top: 10px; }
  .qbtn{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .qbtn:hover{ border-color: var(--accent); }
  .goal-edit{
    font-size: 12px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    margin-left: 6px;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Nutrición ---- */
  .menu-toggle{
    display:flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .menu-toggle button{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .menu-toggle button.active{
    color: var(--text);
    border-color: var(--accent);
  }
  .meal-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 11px;
    margin-bottom: 12px;
  }
  .meal-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .meal-row{
    font-size: 13.5px;
    line-height: 1.6;
    margin-bottom: 2px;
  }
  .meal-row b{ color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; margin-right: 6px;}
  .opt-list{ margin: 0 0 10px 0; padding: 8px 10px 8px 24px; font-size: 13px; line-height: 1.55; background: var(--surface-2); border-radius: 0 0 10px 10px; }

  /* ---- Horario semanal ---- */
  .sched-list{ background: var(--surface-2); border-radius: 0 0 10px 10px; padding: 6px 0; }
  .sched-row{ display:flex; gap: 8px; padding: 5px 12px; border-bottom: 1px solid var(--line); align-items:flex-start; }
  .sched-row:last-child{ border-bottom: none; }
  .sched-time{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--cedar); min-width: 36px; padding-top: 2px; flex-shrink:0; }
  .sched-body{ display:flex; flex-direction:column; gap:1px; }
  .sched-label{ font-size: 13px; }
  .sched-els{ font-size: 12px; }
  .sched-note{ font-size: 11.5px; color: var(--text-muted); line-height: 1.4; }
  .opt-list li{ margin-bottom: 3px; }
  .opt-list:last-child{ margin-bottom: 0; }
  .macro-toggle{
    display:flex;
    width:100%;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    background: var(--surface-2);
    border: none;
    border-radius: 10px;
    color: var(--text);
    padding: 8px 10px;
    margin-bottom: 2px;
    font-family: 'Work Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
  }
  .macro-toggle.open{ border-radius: 10px 10px 0 0; margin-bottom: 0; }
  .macro-toggle-count{ font-family:'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted); font-weight: 400; margin-left: auto; }
  .macro-toggle .toggle-icon{ color: var(--accent); font-weight: 600; width: 14px; text-align:center; }
  .prep-box{
    background: var(--surface-2);
    border-radius: 12px;
    padding: 9px 11px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .prep-box b{ color: var(--text); }

  .supp-row, .water-row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap: 12px;
  }
  .supp-row.done{ border-color: var(--accent); }
  .supp-row input{ width: 17px; height: 17px; accent-color: var(--accent); flex-shrink:0; }
  .water-track{
    display:flex;
    flex-wrap:wrap;
    gap: 6px;
    margin: 10px 0;
  }
  .water-glass{
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--surface-2);
  }
  .water-glass.filled{ background: var(--accent); border-color: var(--accent); }

  .grocery-section{ margin-bottom: 22px; }
  .grocery-list{ list-style:none; padding:0; margin: 0; }
  .grocery-list li{
    display:flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .grocery-list li .gname{ flex:1; }
  .grocery-list li .gprice{ color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 12px; white-space:nowrap; }
  .grocery-total{
    margin-top: 10px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--accent);
  }
  .assumption{
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ---- Ejercicio ---- */
  .phase-alert{
    background: var(--surface-2);
    border: 1px solid var(--menstrual);
    border-radius: 14px;
    padding: 8px 10px;
    margin-bottom: 20px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .phase-alert b{ color: var(--menstrual); }
  .today-exercise{
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 11px;
    margin-bottom: 22px;
  }
  .today-exercise .ex-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .today-exercise .ex-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    margin-bottom: 10px;
  }
  .ex-list{ margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.7; }
  .week-ex-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .week-ex-row.today-row{ color: var(--accent); font-weight: 500; }
  .week-ex-row .wd{ width: 70px; color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; }

  /* ---- Hogar ---- */
  .plant-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .plant-name{ font-family:'Fraunces', serif; font-style: italic; font-size: 15px; margin-bottom: 4px; }
  .plant-water{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .plant-desc{ font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  /* ---- Learning ---- */
  .chunk-chip{
    display:inline-block;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12.5px;
    margin: 3px 4px 0 0;
    font-family:'JetBrains Mono', monospace;
  }
  .stage-card{
    background: var(--surface);

// ---------- Polyfill de almacenamiento ----------
// window.storage solo existe dentro de Claude.ai.
// Fuera (GitHub Pages, local, etc.) usamos localStorage.
(function(){
  if(typeof window.storage !== 'undefined') return; // ya existe, no hacemos nada
  const NS = 'life-app:';
  let store;
  try{
    localStorage.setItem('__test__','1');
    localStorage.removeItem('__test__');
    store = localStorage;
  }catch(e){
    // localStorage bloqueado (modo privado extremo, iframe sin permisos, etc.)
    // Usamos un objeto en memoria como último recurso
    const mem = {};
    store = {
      getItem(k){ return k in mem ? mem[k] : null; },
      setItem(k,v){ mem[k]=String(v); },
      removeItem(k){ delete mem[k]; },
      get length(){ return Object.keys(mem).length; },
      key(i){ return Object.keys(mem)[i]||null; }
    };
  }
  window.storage = {
    async get(key){
      const raw = store.getItem(NS + key);
      if(raw === null) throw new Error('Key not found: ' + key);
      return { key, value: raw };
    },
    async set(key, value){
      store.setItem(NS + key, value);
      return { key, value };
    },
    async delete(key){
      store.removeItem(NS + key);
      return { key, deleted: true };
    },
    async list(prefix){
      const p = NS + (prefix || '');
      const keys = [];
      for(let i=0;i<store.length;i++){
        const k = store.key(i);
        if(k && k.startsWith(p)) keys.push(k.slice(NS.length));
      }
      return { keys, prefix };
    }
  };
})();

function triGlyph(kind){
  // minimal alchemical-style glyphs as inline SVG strings
  if(kind==='up') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,4 23,21 3,21" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>`;
  if(kind==='down') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,22 3,5 23,5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>`;
  if(kind==='up-bar') return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,4 23,21 3,21" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="7" y1="15" x2="19" y2="15" stroke="currentColor" stroke-width="1.6"/></svg>`;
  return `<svg class="glyph" viewBox="0 0 26 26"><polygon points="13,22 3,5 23,5" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="7" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.6"/></svg>`;
}

function phaseForDay(dayInCycle, cycleLength){
  const frac = dayInCycle / cycleLength;
  if(frac <= 0.18) return 'menstrual';
  if(frac <= 0.46) return 'folicular';
  if(frac <= 0.57) return 'ovulatoria';
  return 'lutea';
}

function diffInDays(a,b){
  const ms = b.setHours(0,0,0,0) - a.setHours(0,0,0,0);
  return Math.floor(ms / 86400000);
}

function getCycleInfo(config){
  const start = new Date(config.lastPeriodStart + 'T00:00:00');
  const today = new Date();
  let elapsed = diffInDays(new Date(start), new Date(today));
  if(elapsed < 0) elapsed = 0;
  const dayInCycle = (elapsed % config.cycleLength) + 1;
  const phaseKey = phaseForDay(dayInCycle, config.cycleLength);
  return { dayInCycle, cycleLength: config.cycleLength, phaseKey, fraction: dayInCycle / config.cycleLength };
}

function wireMacroToggles(container){
  if(!container) return;
  container.querySelectorAll('.macro-toggle').forEach(btn=>{
    btn.onclick = ()=>{
      const list = document.getElementById(btn.dataset.target);
      const icon = document.getElementById('icon-' + btn.dataset.target);
      if(!list) return;
      const isOpen = list.style.display !== 'none';
      list.style.display = isOpen ? 'none' : 'block';
      if(icon) icon.textContent = isOpen ? '+' : '−';
      btn.classList.toggle('open', !isOpen);
    };
  });
}

function getWeekKey(date){
  const d = new Date(date);
  const dow = (d.getDay() + 6) % 7; // 0 = lunes
  d.setDate(d.getDate() - dow);
  return d.toISOString().slice(0,10);
}
function nextMonday(date){
  const d = new Date(date);
  const dow = d.getDay();
  const add = dow === 1 ? 7 : ((8 - dow) % 7 || 7);
  d.setDate(d.getDate() + add);
  return d;
}
function fmtShort(d){
  return d.toLocaleDateString('es-CO', {day:'numeric', month:'short'});
}

function isSucculentWeek(date){
  const ref = new Date('2026-01-05T00:00:00'); // lunes de referencia
  const weeksSince = Math.floor((date - ref) / (7*86400000));
  return ((weeksSince % 2) + 2) % 2 === 0;
}

// Score semanal: cuenta checks por día en toda la app
const SCORE_MAX_PER_DAY = 10; // puntos máximos posibles por día

function calcDayScore(ritualDay, nutriDay, hogarDay, exerciseDay, learningDay, hogarTasks){
  let score = 0;
  // Rituales body (4 items)
  ['skincareAM','skincarePM','sunscreen','hair'].forEach(k=>{ if(ritualDay[k]) score++; });
  // Suplementos (3)
  if(nutriDay.supplements){
    ['supp-am','supp-lunch','supp-night'].forEach(k=>{ if(nutriDay.supplements[k]) score++; });
  }
  // Agua (≥1200ml = 1 punto)
  if((nutriDay.water||0) >= 1200) score++;
  // Ejercicio
  if(exerciseDay.done) score++;
  // Learning
  if(learningDay.habit) score++;
  // Hogar: al menos 1 tarea completada
  if(hogarTasks && hogarTasks.some(t=> hogarDay[t.key+'::'+t.name])) score++;
  return Math.min(score, SCORE_MAX_PER_DAY);
}

async function loadWeekScores(today){
  const scores = {};
  const base = new Date(today);
  const dow = (base.getDay()+6)%7;
  base.setDate(base.getDate() - dow); // lunes de esta semana
  for(let i=0;i<7;i++){
    const d = new Date(base);
    d.setDate(base.getDate()+i);
    const dk = d.toISOString().slice(0,10);
    const [rit, nutri, hogar, exercise, learning] = await Promise.all([
      loadRitualDay(dk), loadNutriDay(dk), loadHogarDay(dk), loadExerciseDay(dk), loadLearningDay(dk)
    ]);
    nutri.supplements = nutri.supplements||{};
    nutri.water = nutri.water||0;
    const tasks = getHogarTasks(d);
    scores[dk] = calcDayScore(rit, nutri, hogar, exercise, learning, tasks);
  }
  return scores;
}

const FINANZAS_TRACKED = ['Mercado', 'Ocio y salidas'];
function trackedKey(item){ return item.name + '-' + item.day + '-acumulado'; }
function getPaidAmount(item, monthData){
  if(FINANZAS_TRACKED.includes(item.name)){
    const acumulado = monthData[trackedKey(item)] || 0;
    return Math.min(acumulado, item.amount);
  }
  return monthData[item.name + '-' + item.day] ? item.amount : 0;
}

function renderScheduleAccordion(todayDow){
  const container = document.getElementById('scheduleAccordion');
  if(!container) return;
  container.innerHTML = '';
  WEEKLY_SCHEDULE.forEach(day=>{
    const isToday = day.dow === todayDow;
    const wrapper = document.createElement('div');
    wrapper.style.marginBottom = '6px';
    const btn = document.createElement('button');
    btn.className = 'macro-toggle' + (isToday ? ' open' : '');
    btn.style.background = isToday ? 'var(--cedar)' : '';
    btn.style.color = isToday ? 'var(--bone)' : '';
    btn.innerHTML = `<span>${day.day}</span><span class="macro-toggle-count">${day.tag}</span><span class="toggle-icon" id="sched-icon-${day.dow}">${isToday ? '−' : '+'}</span>`;
    const list = document.createElement('div');
    list.className = 'sched-list';
    list.style.display = isToday ? 'block' : 'none';
    list.innerHTML = day.blocks.map(b=>`
      <div class="sched-row">
        <span class="sched-time">${b.time}</span>
        <span class="sched-body">
          <span class="sched-label">${b.label}${b.elements.length ? ' <span class="sched-els">'+b.elements.join(' ')+'</span>' : ''}</span>
          ${b.note ? `<span class="sched-note">${b.note}</span>` : ''}
        </span>
      </div>`).join('');
    btn.onclick = ()=>{
      const isOpen = list.style.display !== 'none';
      list.style.display = isOpen ? 'none' : 'block';
      const icon = document.getElementById('sched-icon-'+day.dow);
      if(icon) icon.textContent = isOpen ? '+' : '−';
      btn.classList.toggle('open', !isOpen);
    };
    wrapper.appendChild(btn);
    wrapper.appendChild(list);
    container.appendChild(wrapper);
  });
}

function hashStringToInt(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = (hash * 31 + str.charCodeAt(i)) % 100000;
  }
  return Math.abs(hash);
}

function getDailyIntention(dateKey){
  const idx = hashStringToInt(dateKey) % INTENTIONS.length;
  return INTENTIONS[idx];
}

function getWeekPosition(date){
  return (date.getDay() + 6) % 7; // 0 = lunes ... 6 = domingo
}

// ---------- Daily: resumen semanal con alertas ----------
async function renderWeeklyOverview(today){
  const container = document.getElementById('weeklyOverview');
  if(!container) return;

  const weekKey = getWeekKey(today);
  const weekData = await loadRitualWeek(weekKey);
  weekData.learningMinutes = weekData.learningMinutes || 0;
  const config = await loadRitualConfig();
  config.learningGoalHours = config.learningGoalHours || 3;
  const pos = getWeekPosition(today);
  const urgent = pos >= 5; // sábado o domingo
  const closing = pos === 4; // viernes, aviso suave

  document.getElementById('weeklyOverviewSub').textContent = urgent
    ? '¡Se acaba la semana! Esto es lo que todavía queda pendiente.'
    : 'Lo que no es diario pero igual hay que cumplir antes de que cierre la semana.';

  const laserDue = !config.laserLastDate || diffInDays(new Date(config.laserLastDate + 'T00:00:00'), new Date(today)) >= 4;

  container.innerHTML = `
    <div class="rit-item" id="weekNails"></div>
    <div class="rit-item" id="weekLaser"></div>
    <div class="rit-item" id="weekReading"></div>
    <div class="rit-item" id="weekLearning"></div>
    <div class="rit-item" id="weekMeditation"></div>
  `;

  function alertLine(done, name){
    if(done || !(urgent || closing)) return '';
    const msg = urgent ? `Se acaba la semana — ${name} sigue pendiente.` : `Ya casi termina la semana — no olvides ${name}.`;
    return `<div class="rit-item-desc" style="color:var(--menstrual); margin-top:6px;">⚠ ${msg}</div>`;
  }

  // Uñas
  const weekNails = document.getElementById('weekNails');
  weekNails.className = 'rit-item' + (weekData.nails ? ' done' : '');
  weekNails.innerHTML = `<label class="rit-row">
      <input type="checkbox" ${weekData.nails ? 'checked' : ''}>
      <div><div class="rit-item-name">Uñas</div><div class="rit-item-desc">Una vez por semana.</div></div>
    </label>
    ${alertLine(weekData.nails, 'hacerte las uñas')}`;
  weekNails.querySelector('input').onchange = async (e)=>{
    weekData.nails = e.target.checked;
    await saveRitualWeek(weekKey, weekData);
    renderWeeklyOverview(today);
  };

  // Láser
  const weekLaser = document.getElementById('weekLaser');
  weekLaser.className = 'rit-item' + (!laserDue ? ' done' : '');
  weekLaser.innerHTML = `
    <div class="rit-item-name">Láser</div>
    <div class="rit-item-desc">${laserDue ? 'Te toca hoy.' : 'Al día, cada 4 días aprox.'}</div>
    <div class="quick-add"><button class="qbtn" id="weekLaserBtn">Hecho hoy</button></div>
    ${alertLine(!laserDue, 'tu sesión de láser')}
  `;
  document.getElementById('weekLaserBtn').onclick = async ()=>{
    config.laserLastDate = todayStr();
    await saveRitualConfig(config);
    renderWeeklyOverview(today);
  };

  // Lectura

function arcSegments(cx, cy, r){
  // four quadrant arcs colored by phase, starting at top, clockwise
  const bounds = [0, 0.18, 0.46, 0.57, 1];
  const keys = ['menstrual','folicular','ovulatoria','lutea'];
  let svg = '';
  for(let i=0;i<4;i++){
    const a0 = bounds[i]*360 - 90;
    const a1 = bounds[i+1]*360 - 90;
    svg += describeArc(cx, cy, r, a0, a1, PHASES[keys[i]].color);
  }
  return svg;
}
function describeArc(cx, cy, r, a0, a1, color){
  const start = polarToCartesian(cx, cy, r, a1);
  const end = polarToCartesian(cx, cy, r, a0);
  const largeArc = (a1 - a0) <= 180 ? 0 : 1;
  return `<path d="M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round" opacity="0.85"/>`;
}
function polarToCartesian(cx, cy, r, angleDeg){
  const a = angleDeg * Math.PI / 180;
  return { x: (cx + r*Math.cos(a)).toFixed(1), y: (cy + r*Math.sin(a)).toFixed(1) };
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openSettingsModal(config){
  const overlay = document.getElementById('settingsOverlay');
  document.getElementById('editStart').value = config.lastPeriodStart;
  document.getElementById('editLength').value = config.cycleLength;
  overlay.classList.add('show');

  document.getElementById('cancelSettings').onclick = ()=> overlay.classList.remove('show');
  document.getElementById('saveSettings').onclick = async ()=>{
    const start = document.getElementById('editStart').value;
    const length = parseInt(document.getElementById('editLength').value || '28', 10);
    if(!start){ showToast('Necesito una fecha.'); return; }
    await saveConfig({lastPeriodStart: start, cycleLength: length});
    overlay.classList.remove('show');
    showToast('Ciclo actualizado.');
    renderDashboard();
  };
}

  document.getElementById('med-add').onclick = async ()=>{
    weekData.meditationCount += 1;
    await saveRitualWeek(weekKey, weekData);
    renderRituales();
  };
  const medRemove = document.getElementById('med-remove');
  if(medRemove) medRemove.onclick = async ()=>{
    weekData.meditationCount = Math.max(0, weekData.meditationCount - 1);
    await saveRitualWeek(weekKey, weekData);
    renderRituales();
  };
}

async function renderColRituales(dateKey){
  const container = document.getElementById('todayRituales');
  if(!container) return;
  const today = new Date();
  const dow = today.getDay();
  const isMonday = dow === 1;
  const weekKey = getWeekKey(today);

  const [ritualDay, nutriDay, weekData, ritConfig, exerciseDay, hogarDay, learningDay] = await Promise.all([
    loadRitualDay(dateKey), loadNutriDay(dateKey), loadRitualWeek(weekKey),
    loadRitualConfig(), loadExerciseDay(dateKey), loadHogarDay(dateKey), loadLearningDay(dateKey)
  ]);
  nutriDay.supplements = nutriDay.supplements || {};
  nutriDay.water = nutriDay.water || 0;
  weekData.learningMinutes = weekData.learningMinutes || 0;
  ritConfig.learningGoalHours = ritConfig.learningGoalHours || 3;
  const hairToday = HAIR_SCHEDULE[dow];
  const hogarTasks = getHogarTasks(today);
  const todayEx = WEEKDAY_EXERCISE[dow];
  const learningExtra = LEARNING_WEEKDAY_EXTRA[dow];

  function addLabel(text, mt){
    const d = document.createElement('div');
    d.className = 'rit-group-label';
    if(mt) d.style.marginTop = mt;
    d.textContent = text;
    container.appendChild(d);
  }
  function addCheck(name, checked, onchange){
    const el = document.createElement('div');
    el.className = 'rit-item' + (checked ? ' done' : '');
    el.innerHTML = `<label class="rit-row"><input type="checkbox" ${checked?'checked':''}><div class="rit-item-name">${name}</div></label>`;
    el.querySelector('input').onchange = e=>{ el.classList.toggle('done',e.target.checked); onchange(e.target.checked); };
    container.appendChild(el);
    return el;
  }

  container.innerHTML = '';

  // ---- Skincare ----
  addLabel('Skincare & Body');
  addCheck('Skincare AM', !!ritualDay.skincareAM, v=>{ ritualDay.skincareAM=v; saveRitualDay(dateKey,ritualDay); });
  addCheck('Skincare PM', !!ritualDay.skincarePM, v=>{ ritualDay.skincarePM=v; saveRitualDay(dateKey,ritualDay); });
  addCheck('Protector solar', !!ritualDay.sunscreen, v=>{ ritualDay.sunscreen=v; saveRitualDay(dateKey,ritualDay); });
  addCheck(`Cabello: ${hairToday.label}`, !!ritualDay.hair, v=>{ ritualDay.hair=v; saveRitualDay(dateKey,ritualDay); });
  if(isMonday) addCheck('Isotretinoína (lunes)', !!ritualDay.isotretinoina, v=>{ ritualDay.isotretinoina=v; saveRitualDay(dateKey,ritualDay); });

  // ---- Suplementos ----
  addLabel('Suplementos', '10px');
  SUPPLEMENTS.forEach(s=>{
    const checked = !!nutriDay.supplements[s.key];
    const row = document.createElement('div');
    row.className = 'supp-row' + (checked ? ' done' : '');
    row.innerHTML = `<input type="checkbox" ${checked?'checked':''}><div><div class="rit-item-name">${s.name}</div><div class="rit-item-desc">${s.moment}</div></div>`;
    row.querySelector('input').onchange = async(e)=>{ nutriDay.supplements[s.key]=e.target.checked; row.classList.toggle('done',e.target.checked); await saveNutriDay(dateKey,nutriDay); };
    container.appendChild(row);
  });

  // ---- Agua ----
  const waterRow = document.createElement('div');
  waterRow.className = 'rit-item';
  waterRow.style.marginTop = '6px';
  waterRow.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;"><span class="rit-item-desc" id="colWaterDesc">Agua: ${nutriDay.water} de ${WATER_GOAL_ML} ml</span><div class="quick-add" style="margin:0;"><button class="qbtn" id="colWaterAdd1">+200</button><button class="qbtn" id="colWaterAdd2">+500</button></div></div>
    <div class="progress-bar" style="margin-top:6px;"><div class="progress-fill" id="colWaterBar" style="width:${Math.min(100,Math.round(nutriDay.water/WATER_GOAL_ML*100))}%"></div></div>`;
  container.appendChild(waterRow);
  document.getElementById('colWaterAdd1').onclick = async()=>{
    nutriDay.water=Math.min(nutriDay.water+WATER_STEP_ML, WATER_GOAL_ML*2);
    document.getElementById('colWaterDesc').textContent=`Agua: ${nutriDay.water} de ${WATER_GOAL_ML} ml`;
    document.getElementById('colWaterBar').style.width=Math.min(100,Math.round(nutriDay.water/WATER_GOAL_ML*100))+'%';
    await saveNutriDay(dateKey,nutriDay);
  };
  document.getElementById('colWaterAdd2').onclick = async()=>{
    nutriDay.water=Math.min(nutriDay.water+500, WATER_GOAL_ML*2);
    document.getElementById('colWaterDesc').textContent=`Agua: ${nutriDay.water} de ${WATER_GOAL_ML} ml`;
    document.getElementById('colWaterBar').style.width=Math.min(100,Math.round(nutriDay.water/WATER_GOAL_ML*100))+'%';
    await saveNutriDay(dateKey,nutriDay);
  };

  // ---- Ejercicio ----
  addLabel('Ejercicio', '10px');
  todayEx.sessions.forEach((sess,i)=>{
    addCheck(`${sess.time} · ${sess.name}`, !!exerciseDay['done'+i], v=>{ exerciseDay['done'+i]=v; saveExerciseDay(dateKey,exerciseDay); });
  });

  // ---- Hogar ----
  if(hogarTasks.length){
    addLabel('Hogar', '10px');
    hogarTasks.forEach(task=>{
      const sk = task.key+'::'+task.name;
      addCheck(task.name, !!hogarDay[sk], v=>{ hogarDay[sk]=v; saveHogarDay(dateKey,hogarDay); });
    });
  }

  // ---- Learning ----
  addLabel('Learning', '10px');
  addCheck('Shadowing + repaso · 15 min', !!learningDay.habit, v=>{ learningDay.habit=v; saveLearningDay(dateKey,learningDay); });
  if(learningExtra) addCheck(learningExtra.title, !!learningDay.extra, v=>{ learningDay.extra=v; saveLearningDay(dateKey,learningDay); });

  // ---- Trackers semanales: lectura y aprendizaje ----
  addLabel('Esta semana · Mind', '10px');

  ['reading','learning'].forEach(type=>{
    const isReading = type === 'reading';
    const mins = isReading ? (weekData.readingMinutes||0) : weekData.learningMinutes;
    const goal = isReading ? (ritConfig.readingGoalHours||3)*60 : ritConfig.learningGoalHours*60;
    const label = isReading ? 'Lectura' : 'Aprendizaje';
    const pct = Math.min(100, Math.round(mins/goal*100));
    const tracker = document.createElement('div');
    tracker.className = 'rit-item';
    tracker.style.marginBottom = '8px';
    tracker.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="rit-item-name">${label}</div>
        <span class="rit-item-desc">${(mins/60).toFixed(1)}h / ${goal/60}h</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="quick-add" style="margin-top:6px;">
        <button class="qbtn" data-type="${type}" data-min="15">+15 min</button>
        <button class="qbtn" data-type="${type}" data-min="30">+30 min</button>
      </div>`;
    container.appendChild(tracker);
    tracker.querySelectorAll('.qbtn').forEach(btn=>{
      btn.onclick = async()=>{
        const add = parseInt(btn.dataset.min);
        if(isReading) weekData.readingMinutes=(weekData.readingMinutes||0)+add;
        else weekData.learningMinutes=(weekData.learningMinutes||0)+add;
        await saveRitualWeek(weekKey, weekData);
        renderColRituales(dateKey);
      };
    });
  });

  // ---- Uñas, láser, meditación semanales ----
  addLabel('Esta semana · Body & Soul', '4px');

  const nailsEl = addCheck('Uñas (semanal)', !!weekData.nails, async v=>{ weekData.nails=v; await saveRitualWeek(weekKey,weekData); });

  const laserDue = !ritConfig.laserLastDate || diffInDays(new Date(ritConfig.laserLastDate+'T00:00:00'), today) >= 4;
  const laserEl = document.createElement('div');
  laserEl.className = 'rit-item' + (laserDue ? '' : ' done');
  laserEl.innerHTML = `<div class="rit-item-name">Láser</div><div class="rit-item-desc">${laserDue ? 'Te toca hoy' : 'Al día'}</div>
    <div class="quick-add"><button class="qbtn" id="colLaserBtn">Hecho hoy</button></div>`;
  container.appendChild(laserEl);
  document.getElementById('colLaserBtn').onclick = async()=>{ ritConfig.laserLastDate=dateKey; await saveRitualConfig(ritConfig); renderColRituales(dateKey); };

  const medEl = document.createElement('div');
  medEl.className = 'rit-item' + ((weekData.meditationCount||0)>=2 ? ' done' : '');
  medEl.innerHTML = `<div class="rit-item-name">Meditación</div><div class="rit-item-desc">${weekData.meditationCount||0} de 2 sesiones</div>
    <div class="quick-add"><button class="qbtn" id="colMedBtn">+1 sesión</button></div>`;
  container.appendChild(medEl);
  document.getElementById('colMedBtn').onclick = async()=>{ weekData.meditationCount=(weekData.meditationCount||0)+1; await saveRitualWeek(weekKey,weekData); renderColRituales(dateKey); };
}

// ---------- Learning: render ----------
async function renderLearning(){
  const today = new Date();
  const dow = today.getDay();
  const dateKey = todayStr();
  const dayData = await loadLearningDay(dateKey);
  const extra = LEARNING_WEEKDAY_EXTRA[dow];

  app.innerHTML = `
    <div class="section-title">Hoy</div>
    <div id="learningToday"></div>

    <div class="rit-block" style="margin-top:28px;">
      <div class="rit-head"><span class="rit-title">Tu semana</span></div>
      <div class="section-sub">Todos los días llevan el hábito de shadowing + repaso. Martes y jueves alternan casual/business, domingo es contenido largo.</div>
      <div id="learningWeek"></div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Track casual</span></div>
      <div class="meal-card">
        <div class="meal-row"><b>Meta</b>${TRACK_CASUAL.goal}</div>
      </div>
      <div class="rit-group-label">Recursos</div>
      <div id="casualResources"></div>
      <div class="rit-group-label">Chunks para tu banco</div>
      <div>${TRACK_CASUAL.chunks.map(c=>`<span class="chunk-chip">${c}</span>`).join('')}</div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Track business · data &amp; marketing</span></div>
      <div class="meal-card">
        <div class="meal-row"><b>Meta</b>${TRACK_BUSINESS.goal}</div>
      </div>
      <div class="rit-group-label">Recursos</div>
      <div id="businessResources"></div>
      <div class="rit-group-label">Chunks para tu banco</div>
      <div>${TRACK_BUSINESS.chunks.map(c=>`<span class="chunk-chip">${c}</span>`).join('')}</div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Tu ruta</span><span class="rit-tag">B2+ → pro</span></div>
      <div id="learningRoadmap"></div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Por qué funciona</span><span class="rit-tag">neurociencia</span></div>
      <div id="learningPrinciples"></div>
    </div>
  `;

  // ---- Hoy ----
  const learningToday = document.getElementById('learningToday');
  const habitChecked = !!dayData.habit;
  const habitEl = document.createElement('div');
  habitEl.className = 'rit-item' + (habitChecked ? ' done' : '');
  habitEl.innerHTML = `<label class="rit-row">
      <input type="checkbox" ${habitChecked ? 'checked' : ''}>
      <div><div class="rit-item-name">${LEARNING_DAILY_HABIT.title}</div><div class="rit-item-desc">${LEARNING_DAILY_HABIT.detail}</div></div>
    </label>`;
  habitEl.querySelector('input').onchange = async (e)=>{
    dayData.habit = e.target.checked;
    habitEl.classList.toggle('done', e.target.checked);
    await saveLearningDay(dateKey, dayData);
  };
  learningToday.appendChild(habitEl);

  if(extra){
    const extraChecked = !!dayData.extra;
    const extraEl = document.createElement('div');
    extraEl.className = 'rit-item' + (extraChecked ? ' done' : '');
    extraEl.innerHTML = `<label class="rit-row">
        <input type="checkbox" ${extraChecked ? 'checked' : ''}>
        <div><div class="rit-item-name">${extra.title}</div><div class="rit-item-desc">${extra.detail}</div></div>
      </label>`;
    extraEl.querySelector('input').onchange = async (e)=>{
      dayData.extra = e.target.checked;
      extraEl.classList.toggle('done', e.target.checked);
      await saveLearningDay(dateKey, dayData);
    };
    learningToday.appendChild(extraEl);
  }

  // ---- Semana ----
  const learningWeek = document.getElementById('learningWeek');
  for(let i=1;i<=7;i++){
    const d = new Date(today);
    d.setDate(today.getDate() - dow + (i % 7));
    const dayIndex = d.getDay();
    const isToday = dayIndex === dow;
    const dayExtra = LEARNING_WEEKDAY_EXTRA[dayIndex];
    const label = dayExtra ? `Shadowing + repaso · ${dayExtra.title}` : 'Shadowing + repaso';
    const row = document.createElement('div');
    row.className = 'week-ex-row' + (isToday ? ' today-row' : '');
    row.innerHTML = `<span class="wd">${WEEKDAY_SHORT[dayIndex]}</span><span>${label}</span>`;
    learningWeek.appendChild(row);
  }

  // ---- Recursos ----
  const casualResources = document.getElementById('casualResources');
  TRACK_CASUAL.resources.forEach(r=>{
    const div = document.createElement('div');
    div.className = 'rit-item-desc';
    div.style.marginBottom = '8px';
    div.textContent = r;
    casualResources.appendChild(div);
  });
  const businessResources = document.getElementById('businessResources');
  TRACK_BUSINESS.resources.forEach(r=>{
    const div = document.createElement('div');
    div.className = 'rit-item-desc';
    div.style.marginBottom = '8px';
    div.textContent = r;
    businessResources.appendChild(div);
  });

  // ---- Roadmap ----
  const learningRoadmap = document.getElementById('learningRoadmap');
  LEARNING_ROADMAP.forEach(s=>{
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.innerHTML = `<div class="stage-title">${s.stage}</div><div class="plant-desc">${s.detail}</div>`;
    learningRoadmap.appendChild(card);
  });

  // ---- Principios ----
  const learningPrinciples = document.getElementById('learningPrinciples');
  LEARNING_PRINCIPLES.forEach(p=>{
    const card = document.createElement('div');
    card.className = 'plant-card';
    card.innerHTML = `<div class="plant-name">${p.name}</div><div class="plant-desc">${p.desc}</div>`;
    learningPrinciples.appendChild(card);
  });
}

// ---------- Finanzas: render ----------
async function renderFinanzas(){
  const today = new Date();
  const monthKey = getMonthKey(today);
  const config = await loadFinanzasConfig();
  const monthData = await loadFinanzasMonth(monthKey);
  const actionsData = await loadFinanzasActions();

  const totalAll = FINANZAS_EXPENSES.reduce((s,e)=>s+e.amount,0);

  const usd6 = config.usd6 || 0;
  const usd21 = config.usd21 || 0;
  const rate = config.rate || 0;
  const cop6 = usd6 * rate;
  const cop21 = usd21 * rate;
  const income = rate ? cop6 + cop21 : null;
  const surplus = income ? income - totalAll : null;

  const day6Total = FINANZAS_EXPENSES.filter(e=>e.day===6).reduce((s,e)=>s+e.amount,0);
  const day21Total = FINANZAS_EXPENSES.filter(e=>e.day===21).reduce((s,e)=>s+e.amount,0);
  const day6Paid = FINANZAS_EXPENSES.filter(e=>e.day===6).reduce((s,e)=> s + getPaidAmount(e, monthData), 0);
  const day21Paid = FINANZAS_EXPENSES.filter(e=>e.day===21).reduce((s,e)=> s + getPaidAmount(e, monthData), 0);
  const day6Pending = day6Total - day6Paid;
  const day21Pending = day21Total - day21Paid;
  const disponible6 = rate ? cop6 - day6Total : null;
  const disponible21 = rate ? cop21 - day21Total : null;

  function pocketTotal(cat){ return FINANZAS_EXPENSES.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0); }
  app.innerHTML = `
    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Tu ingreso mensual</span></div>
      <p class="rit-sub">Ganas en USD y te paga en pesos según la TRM del día — por eso es por quincena y con tasa editable, en vez de un número fijo.</p>
      <div class="card" style="padding:18px;">
        <div class="row">
          <div class="field" style="flex:1; min-width:120px;">
            <label for="usd6Input">Quincena del 6 (USD)</label>
            <input type="number" id="usd6Input" value="${usd6 || ''}" placeholder="1280">
          </div>
          <div class="field" style="flex:1; min-width:120px;">
            <label for="usd21Input">Quincena del 21 (USD)</label>
            <input type="number" id="usd21Input" value="${usd21 || ''}" placeholder="1480">
          </div>
          <div class="field" style="flex:1; min-width:140px;">
            <label for="rateInput">Tasa de cambio (COP/USD)</label>
            <input type="number" id="rateInput" value="${rate || ''}" placeholder="3430">
          </div>
        </div>
        <button class="btn" id="saveIncomeBtn">Guardar</button>
        ${rate ? `<p class="rit-item-desc" style="margin-top:12px;">Día 6: ${usd6} USD ≈ $${cop6.toLocaleString('es-CO',{maximumFractionDigits:0})} · Día 21: ${usd21} USD ≈ $${cop21.toLocaleString('es-CO',{maximumFractionDigits:0})} · <b>Total: $${income.toLocaleString('es-CO',{maximumFractionDigits:0})}</b></p>` : ''}
        <p class="assumption" style="margin-top:10px;">Actualiza la tasa cada quincena con la TRM real del día que te pagan — así el superávit de abajo refleja tu plata real, no un promedio.</p>
      </div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Disponible por quincena</span><span class="rit-tag">lo que dejar en tu tarjeta</span></div>
      <p class="rit-sub">Lo que te queda libre después de cubrir todo lo que toca pagar esa misma quincena — esto es lo que puedes dejar en tu tarjeta para gastar hasta el próximo pago.</p>
      ${rate ? `
        <div class="fin-summary" style="grid-template-columns: repeat(2, 1fr);">
          <div class="pocket-card" style="margin-bottom:0;">
            <div class="pocket-head">
              <span class="pocket-title">Quincena del 6</span>
              <span class="pocket-available" style="color:${disponible6>=0?'var(--folicular)':'var(--menstrual)'};">$${disponible6.toLocaleString('es-CO',{maximumFractionDigits:0})}</span>
            </div>
            <div class="rit-item-desc">Ingreso: $${cop6.toLocaleString('es-CO',{maximumFractionDigits:0})}</div>
            <div class="rit-item-desc">Gastos: $${day6Total.toLocaleString('es-CO')}</div>
            <div class="rit-item-desc" style="color:var(--folicular);">Pagado: $${day6Paid.toLocaleString('es-CO')}</div>
            <div class="rit-item-desc" style="color:${day6Pending>0?'var(--menstrual)':'var(--text-muted)'};">Por pagar: $${day6Pending.toLocaleString('es-CO')}</div>
          </div>
          <div class="pocket-card" style="margin-bottom:0;">
            <div class="pocket-head">
              <span class="pocket-title">Quincena del 21</span>
              <span class="pocket-available" style="color:${disponible21>=0?'var(--folicular)':'var(--menstrual)'};">$${disponible21.toLocaleString('es-CO',{maximumFractionDigits:0})}</span>
            </div>
            <div class="rit-item-desc">Ingreso: $${cop21.toLocaleString('es-CO',{maximumFractionDigits:0})}</div>
            <div class="rit-item-desc">Gastos: $${day21Total.toLocaleString('es-CO')}</div>
            <div class="rit-item-desc" style="color:var(--folicular);">Pagado: $${day21Paid.toLocaleString('es-CO')}</div>
            <div class="rit-item-desc" style="color:${day21Pending>0?'var(--menstrual)':'var(--text-muted)'};">Por pagar: $${day21Pending.toLocaleString('es-CO')}</div>
          </div>
        </div>
        <div class="assumption" style="margin-top:10px;">${disponible6<0 || disponible21<0 ? 'Una de tus quincenas queda en negativo: esa quincena los compromisos pesan más que el ingreso que entra ese día — necesitas cubrir la diferencia con lo que te quede de la otra quincena.' : 'Esto asume que pagas cada compromiso el mismo día que te entra esa quincena. Si pagas algo del día 21 con la plata del día 6, ajusta mentalmente.'} "Pagado" y "Por pagar" se actualizan solos cuando marcas los checks en Tus bolsillos, abajo.</div>
      ` : `<p class="rit-item-desc">Define tu ingreso arriba (USD + tasa de cambio) para ver cuánto te queda libre en cada quincena.</p>`}
    </div>

    <div class="rit-block" id="deficitBlock"></div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Estructura financiera</span><span class="rit-tag">este mes</span></div>
      <div class="fin-summary">
        ${FINANZAS_POCKETS.map(p=>{
          const t = pocketTotal(p);
          const pct = income ? Math.round(t/income*100)+'% del ingreso' : Math.round(t/totalAll*100)+'% del gasto fijo';
          return `<div class="fin-stat"><div class="fin-label">${p}</div><div class="fin-value">$${t.toLocaleString('es-CO')}</div><div class="rit-item-desc">${pct}</div></div>`;
        }).join('')}
      </div>
      <div class="assumption">Benchmark general (50/30/20, ajustado con deudas y Give aparte): 50% necesidades, 30% estilo de vida, 20% ahorro.</div>
      <div class="meal-card" style="margin-top:14px;">
        <div class="meal-row"><b>Total comprometido del mes</b>$${totalAll.toLocaleString('es-CO')}</div>
        ${income ? `<div class="meal-row" style="color:${surplus>=0?'var(--folicular)':'var(--menstrual)'};"><b>${surplus>=0 ? 'Superávit' : 'Déficit'} mensual</b>$${Math.abs(surplus).toLocaleString('es-CO')}</div>` : ''}
      </div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Tus bolsillos</span><span class="rit-tag">marca lo que ya pagaste</span></div>
      <p class="rit-sub">Cada bolsillo es lo que asignas ese rubro. Al marcar un pago, se resta de lo disponible — así sabes en cualquier momento del mes cuánto te queda de cada uno. Se reinicia solo cada mes.</p>
      <button class="settings-link" id="resetMonthBtn">Reiniciar este mes</button>
      <div class="rit-group-label" style="margin-top:14px;">Filtrar por fecha de pago</div>
      <div class="menu-toggle" id="dayFilters"></div>
      <div id="pocketsArea" style="margin-top:14px;"></div>
    </div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Portafolio de inversiones</span></div>
      <div id="investList"></div>
    </div>

    <div class="rit-block" id="projectionBlock"></div>

    <div class="rit-block">
      <div class="rit-head"><span class="rit-title">Plan de optimización</span><span class="rit-tag">action items</span></div>
      <div id="actionsList"></div>
      <p class="assumption">No soy asesora financiera certificada — esto es una estructura y unas alertas basadas en los números que me compartiste. Antes de decisiones grandes (refinanciar, mover inversiones, aportes voluntarios), confírmalo con tu banco o un asesor financiero/tributario real.</p>
    </div>
  `;

  // ---- Diagnóstico de déficit ----
  const deficitBlock = document.getElementById('deficitBlock');
  if(income !== null){
    if(surplus < 0){
      const sorted = [...FINANZAS_EXPENSES].sort((a,b)=>b.amount-a.amount).slice(0,5);
      deficitBlock.innerHTML = `
        <div class="rit-head"><span class="rit-title">Por qué estás en déficit</span><span class="rit-tag">-$${Math.abs(surplus).toLocaleString('es-CO',{maximumFractionDigits:0})}/mes</span></div>
        <div class="meal-card">
          <div class="meal-row"><b>Te entra</b>$${income.toLocaleString('es-CO',{maximumFractionDigits:0})}</div>
          <div class="meal-row"><b>Te comprometes a</b>$${totalAll.toLocaleString('es-CO')}</div>
          <div class="meal-row" style="color:var(--menstrual);"><b>La diferencia</b>-$${Math.abs(surplus).toLocaleString('es-CO',{maximumFractionDigits:0})}</div>
        </div>
        <p class="rit-item-desc" style="margin:10px 0 6px;">Con la tasa de cambio que pusiste, lo que te comprometes a pagar cada mes es más de lo que te entra. Estos son tus 5 rubros más grandes — ahí está la mayor palanca para cerrar la brecha:</p>
        <ul class="grocery-list">
          ${sorted.map(e=>`<li><span class="gname">${e.name} <span class="rit-tag" style="margin-left:6px;">${e.category} · día ${e.day}</span></span><span class="gprice">$${e.amount.toLocaleString('es-CO')}</span></li>`).join('')}
        </ul>
        <div class="assumption" style="margin-top:10px;">No necesitas eliminar nada de golpe: bajar cualquiera de estos rubros, aunque sea un poco (como ya hicimos con Educación), tiene más impacto que recortar varias cosas pequeñas. Revisa primero "Viaje" y "Ocio y salidas" — son las que más margen de maniobra suelen tener mes a mes.</div>
      `;
    } else {
      deficitBlock.innerHTML = '';
    }
  } else {
    deficitBlock.innerHTML = '';
  }

  document.getElementById('saveIncomeBtn').onclick = async ()=>{
    const u6 = parseFloat(document.getElementById('usd6Input').value);
    const u21 = parseFloat(document.getElementById('usd21Input').value);
    const r = parseFloat(document.getElementById('rateInput').value);
    config.usd6 = isNaN(u6) ? 0 : u6;
    config.usd21 = isNaN(u21) ? 0 : u21;
    config.rate = isNaN(r) ? 0 : r;
    await saveFinanzasConfig(config);
    renderFinanzas();
  };

  document.getElementById('resetMonthBtn').onclick = async ()=>{
    await saveFinanzasMonth(monthKey, {});
    showToast('Mes reiniciado.');
    renderFinanzas();
  };

  // ---- Filtro por día de pago ----
  const dayFilters = document.getElementById('dayFilters');
  ['Todos','Día 6','Día 21'].forEach(f=>{
    const btn = document.createElement('button');
    btn.textContent = f;
    btn.className = finanzasDayFilter === f ? 'active' : '';
    btn.onclick = ()=>{ finanzasDayFilter = f; renderFinanzas(); };
    dayFilters.appendChild(btn);
  });
  const dayFilterValue = finanzasDayFilter === 'Día 6' ? 6 : (finanzasDayFilter === 'Día 21' ? 21 : null);

  // ---- Bolsillos ----
  const pocketsArea = document.getElementById('pocketsArea');
  FINANZAS_POCKETS.forEach(pocket=>{
    const allItems = FINANZAS_EXPENSES.filter(e=>e.category===pocket);
    const items = dayFilterValue ? allItems.filter(e=>e.day===dayFilterValue) : allItems;
    if(items.length === 0) return; // este bolsillo no tiene pagos en el día filtrado

    const asignado = items.reduce((s,e)=>s+e.amount,0);
    const pagado = items.reduce((s,e)=> s + getPaidAmount(e, monthData), 0);
    const disponible = asignado - pagado;
    const pct = asignado ? Math.round((pagado/asignado)*100) : 0;

    const card = document.createElement('div');
    card.className = 'pocket-card';
    const debtsForPocket = pocket === 'Deudas' ? FINANZAS_DEBTS : [];
    card.innerHTML = `
      <div class="pocket-head">
        <span class="pocket-title">${pocket}</span>
        <span class="pocket-available">$${disponible.toLocaleString('es-CO')} disponible</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="rit-item-desc" style="margin-bottom:10px;">Pagado $${pagado.toLocaleString('es-CO')} de $${asignado.toLocaleString('es-CO')} asignado${dayFilterValue ? ' (filtrado a día '+dayFilterValue+')' : ''}</div>
      ${debtsForPocket.map(d=>`
        <div class="debt-card" style="margin-bottom:10px;">
          <div class="debt-name">${d.name}</div>
          <div class="rit-item-desc">Deuda total: $${d.total.toLocaleString('es-CO')} · Tasa: ${d.rate}</div>
          <div class="rit-item-desc">Cuota ${d.cuotaReal ? 'mínima' : ''}: $${d.cuota.toLocaleString('es-CO')}${d.cuotaReal ? ` · Estás pagando: $${d.cuotaReal.toLocaleString('es-CO')} (abono extra)` : ''}</div>
          <div class="rit-item-desc">Vas en la cuota ${d.paymentsDone} de ${d.paymentsTotal} (${Math.round(d.paymentsDone/d.paymentsTotal*100)}% del plazo)</div>
        </div>
      `).join('')}
      <div id="pocketItems-${pocket.replace(/[^a-zA-Z]/g,'')}"></div>
    `;
    pocketsArea.appendChild(card);

    const itemsContainer = card.querySelector(`#pocketItems-${pocket.replace(/[^a-zA-Z]/g,'')}`);
    items.forEach(item=>{
      if(FINANZAS_TRACKED.includes(item.name)){
        const key = trackedKey(item);
        const uid = key.replace(/[^a-zA-Z0-9]/g,'');
        const acumulado = monthData[key] || 0;
        const restante = item.amount - acumulado;
        const trackPct = Math.min(100, Math.round((acumulado/item.amount)*100));
        const restanteText = restante >= 0
          ? `Disponible $${restante.toLocaleString('es-CO')}`
          : `Te excediste por $${Math.abs(restante).toLocaleString('es-CO')}`;
        const row = document.createElement('div');
        row.className = 'rit-item' + (acumulado >= item.amount ? ' done' : '');
        row.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="rit-item-name">${item.name} <span class="rit-item-desc">Día ${item.day} · vas gastando de a poco</span></div>
            <span class="gprice">$${item.amount.toLocaleString('es-CO')}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${trackPct}%"></div></div>
          <div class="rit-item-desc">Acumulado $${acumulado.toLocaleString('es-CO')} · ${restanteText}</div>
          <div class="quick-add" style="margin-top:8px;">
            <input type="number" id="trackInput-${uid}" placeholder="Monto de hoy" style="flex:1; min-width:100px; max-width:160px; background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:6px 10px; font-size:13px;">
            <button class="qbtn" id="trackAdd-${uid}">Agregar gasto</button>
            <button class="qbtn" id="trackReset-${uid}">Reiniciar</button>
          </div>
        `;
        itemsContainer.appendChild(row);
        document.getElementById(`trackAdd-${uid}`).onclick = async ()=>{
          const val = parseFloat(document.getElementById(`trackInput-${uid}`).value);
          if(isNaN(val) || val <= 0){ showToast('Ingresa un monto válido.'); return; }
          monthData[key] = (monthData[key] || 0) + val;
          await saveFinanzasMonth(monthKey, monthData);
          renderFinanzas();
        };
        document.getElementById(`trackReset-${uid}`).onclick = async ()=>{
          monthData[key] = 0;
          await saveFinanzasMonth(monthKey, monthData);
          renderFinanzas();
        };
        return;
      }

      const checked = !!monthData[item.name + '-' + item.day];
      const row = document.createElement('div');
      row.className = 'rit-item' + (checked ? ' done' : '');
      row.innerHTML = `<label class="rit-row" style="justify-content:space-between; display:flex; align-items:center;">
          <span style="display:flex; align-items:center; gap:10px;">
            <input type="checkbox" ${checked ? 'checked' : ''}>
            <span><div class="rit-item-name">${item.name}</div><div class="rit-item-desc">Día ${item.day}</div></span>
          </span>
          <span class="gprice">$${item.amount.toLocaleString('es-CO')}</span>
        </label>`;
      row.querySelector('input').onchange = async (e)=>{
        monthData[item.name + '-' + item.day] = e.target.checked;
        await saveFinanzasMonth(monthKey, monthData);
        renderFinanzas();
      };
      itemsContainer.appendChild(row);
    });
  });

  const investList = document.getElementById('investList');
  FINANZAS_INVESTMENTS.forEach(inv=>{
    const card = document.createElement('div');
    card.className = 'debt-card';
    card.innerHTML = `
      <div class="debt-name">${inv.name}</div>
      <div class="rit-item-desc">Invertido: $${inv.invested.toLocaleString('es-CO')} · Rentabilidad esperada: $${inv.expectedReturn.toLocaleString('es-CO')} · Total: $${inv.total.toLocaleString('es-CO')}</div>
      <div class="rit-item-desc">${inv.date}</div>
    `;
    investList.appendChild(card);
  });

  // ---- Proyección ----
  const projectionBlock = document.getElementById('projectionBlock');
  if(income && surplus !== null){
    const p6 = surplus * 6;
    const p12 = surplus * 12;
    projectionBlock.innerHTML = `
      <div class="rit-head"><span class="rit-title">Proyección</span><span class="rit-tag">solo efectivo, sin rendimientos</span></div>
      <div class="meal-card">
        <div class="meal-row"><b>En 6 meses</b>${surplus>=0 ? '+' : ''}$${p6.toLocaleString('es-CO')}</div>
        <div class="meal-row"><b>En 12 meses</b>${surplus>=0 ? '+' : ''}$${p12.toLocaleString('es-CO')}</div>
      </div>
      <div class="assumption">Proyección simple (superávit × meses), sin contar el crecimiento de tu CDT ni de Happi — esos van aparte, ni la reducción de tu deuda Scotiabank por los abonos extra. ${surplus<0 ? 'Tu flujo actual está en déficit: revisa el plan de optimización abajo antes de comprometer más gastos.' : ''}</div>
    `;
  } else {
    projectionBlock.innerHTML = `
      <div class="rit-head"><span class="rit-title">Proyección</span></div>
      <p class="rit-item-desc">Define tu ingreso mensual arriba para ver tu proyección a 6 y 12 meses.</p>
    `;
  }

  // ---- Action items ----
  const actionsList = document.getElementById('actionsList');
  FINANZAS_ACTIONS.forEach(a=>{
    const checked = !!actionsData[a.id];
    const el = document.createElement('div');
    el.className = 'rit-item' + (checked ? ' done' : '');
    el.innerHTML = `<label class="rit-row">
        <input type="checkbox" ${checked ? 'checked' : ''}>
        <div class="rit-item-desc">${a.text}</div>
      </label>`;
    el.querySelector('input').onchange = async (e)=>{
      actionsData[a.id] = e.target.checked;
      el.classList.toggle('done', e.target.checked);
      await saveFinanzasActions(actionsData);
    };
    actionsList.appendChild(el);
  });
}

// ---------- Tabs ----------
function setActiveTab(id){
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if(btn) btn.classList.add('active');
}

document.getElementById('tab-daily').onclick = ()=>{ setActiveTab('tab-daily'); renderDashboard(); };
document.getElementById('tab-nutricion').onclick = ()=>{ setActiveTab('tab-nutricion'); renderNutricion(); };
document.getElementById('tab-ejercicio').onclick = ()=>{ setActiveTab('tab-ejercicio'); renderEjercicio(); };
document.getElementById('tab-hogar').onclick = ()=>{ setActiveTab('tab-hogar'); renderHogar(); };
document.getElementById('tab-learning').onclick = ()=>{ setActiveTab('tab-learning'); renderLearning(); };
document.getElementById('tab-finanzas').onclick = ()=>{ setActiveTab('tab-finanzas'); renderFinanzas(); };

renderDashboard();

</script>
</body>
</html>
