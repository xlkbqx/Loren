<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loren's life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3EFE7;
    --surface: #FBF9F4;
    --surface-2: #E8E1D3;
    --line: rgba(35,49,38,0.12);
    --text: #2A2420;
    --text-muted: #7C7468;
    --bordeaux: #4A1A23;
    --hunter: #233126;
    --sage: #6A7657;
    --bone: #D8D0C2;
    --cedar: #8C603E;
    --menstrual: var(--bordeaux);
    --folicular: var(--sage);
    --ovulatoria: var(--cedar);
    --lutea: var(--hunter);
    --accent: var(--cedar);
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 18px 60px;
  }
  .wrap{max-width: 720px; margin: 0 auto;}

  .brand{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .brand-logo{ width: 38px; height: 38px; flex-shrink:0; color: var(--cedar); }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 34px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .nav{
    display:flex;
    gap: 6px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    overflow-x:auto;
  }
  .nav button{
    background:none;
    border:none;
    color: var(--text-muted);
    font-family:'Work Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .nav button.active{
    color: var(--text);
    border-bottom: 2px solid var(--accent);
    font-weight: 500;
  }
  .nav button:disabled{
    cursor: default;
    opacity: 0.45;
  }

  /* ---- Setup card ---- */
  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }
  .card h2{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 8px;
  }
  .card p.hint{
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 20px;
    line-height: 1.5;
  }
  label{
    display:block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field{margin-bottom: 18px;}
  input[type=date], input[type=number]{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Work Sans', sans-serif;
  }
  input:focus{outline: 2px solid var(--accent); outline-offset: 1px;}
  .btn{
    background: var(--accent);
    color: var(--surface);
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }
  .btn.ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    font-weight: 500;
  }
  .row{display:flex; gap: 12px; flex-wrap: wrap; align-items:center;}

  /* ---- Dial ---- */
  .intention-card{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.5;
    text-align: center;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 24px;
  }

  .dial-section{
    display:flex;
    flex-direction: column;
    align-items:center;
    text-align:center;
    margin-bottom: 30px;
  }
  .dial-wrap{position:relative; width: 230px; height: 230px;}
  .dial-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .moon-glyph{font-size: 30px; line-height:1;}
  .day-number{
    font-family:'JetBrains Mono', monospace;
    font-size: 28px;
    margin-top: 4px;
  }
  .day-total{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }
  .phase-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    margin-top: 14px;
  }
  .phase-energy{
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
    max-width: 380px;
  }
  .settings-link{
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Elements grid ---- */
  .section-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .section-sub{
    color: var(--text-muted);
    font-size: 13px;
    margin: 0 0 18px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 520px){ .grid{grid-template-columns: 1fr;} }

  .el-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
  }
  .el-head{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .glyph{width: 26px; height: 26px; flex-shrink:0;}
  .el-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
  }
  .el-sub{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .el-activity{
    font-size: 14.5px;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .check-row{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor:pointer;
  }
  .check-row input{accent-color: var(--accent);}
  .el-card.done{ border-color: var(--el-color); }

  textarea{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13.5px;
    resize: vertical;
    min-height: 64px;
    margin-top: 10px;
  }
  textarea:focus{outline: 2px solid var(--accent); outline-offset: 1px;}

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    opacity:0;
    transition: opacity 0.25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(15,12,22,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 10;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 26px;
    max-width: 380px;
    width: 100%;
  }

  .loading{ color: var(--text-muted); font-size: 14px; padding: 40px 0; text-align:center; }

  /* ---- Rituales ---- */
  .rit-block{ margin-bottom: 34px; }
  .rit-head{
    display:flex;
    align-items:baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .rit-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
  }
  .rit-tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .rit-sub{ color: var(--text-muted); font-size: 13px; margin: 0 0 16px; }

  .rit-group-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 0 10px;
  }
  .rit-group-label:first-child{ margin-top: 0; }

  .rit-item{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .rit-item.done{ border-color: var(--accent); }
  .rit-item.muted{ opacity: 0.5; }
  .rit-row{
    display:flex;
    align-items:flex-start;
    gap: 12px;
  }
  .rit-row input[type=checkbox]{
    margin-top: 2px;
    accent-color: var(--accent);
    width: 17px; height: 17px;
    flex-shrink:0;
  }
  .rit-item-name{ font-size: 14.5px; font-weight: 500; }
  .rit-item-desc{ font-size: 13px; color: var(--text-muted); margin-top: 3px; line-height: 1.45; }

  .week-strip{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 12px;
  }
  .week-day{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 4px;
    text-align:center;
  }
  .week-day.today{ border-color: var(--accent); }
  .week-day .wd-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .week-day .wd-task{ font-size: 10.5px; margin-top: 4px; line-height: 1.3; min-height: 26px; }

  .progress-bar{
    background: var(--surface-2);
    border-radius: 999px;
    height: 8px;
    overflow:hidden;
    margin: 10px 0 8px;
  }
  .progress-fill{
    height:100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .quick-add{ display:flex; gap: 8px; flex-wrap:wrap; margin-top: 10px; }
  .qbtn{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .qbtn:hover{ border-color: var(--accent); }
  .goal-edit{
    font-size: 12px;
    color: var(--text-muted);
    background:none;
    border:none;
    text-decoration: underline;
    cursor:pointer;
    margin-left: 6px;
    font-family:'Work Sans', sans-serif;
  }

  /* ---- Nutrición ---- */
  .menu-toggle{
    display:flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .menu-toggle button{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .menu-toggle button.active{
    color: var(--text);
    border-color: var(--accent);
  }
  .meal-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .meal-name{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .meal-row{
    font-size: 13.5px;
    line-height: 1.6;
    margin-bottom: 2px;
  }
  .meal-row b{ color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; margin-right: 6px;}
  .prep-box{
    background: var(--surface-2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .prep-box b{ color: var(--text); }

  .supp-row, .water-row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap: 12px;
  }
  .supp-row.done{ border-color: var(--accent); }
  .supp-row input{ width: 17px; height: 17px; accent-color: var(--accent); flex-shrink:0; }
  .water-track{
    display:flex;
    flex-wrap:wrap;
    gap: 6px;
    margin: 10px 0;
  }
  .water-glass{
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--surface-2);
  }
  .water-glass.filled{ background: var(--accent); border-color: var(--accent); }

  .grocery-section{ margin-bottom: 22px; }
  .grocery-list{ list-style:none; padding:0; margin: 0; }
  .grocery-list li{
    display:flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .grocery-list li .gname{ flex:1; }
  .grocery-list li .gprice{ color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 12px; white-space:nowrap; }
  .grocery-total{
    margin-top: 10px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--accent);
  }
  .assumption{
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ---- Ejercicio ---- */
  .phase-alert{
    background: var(--surface-2);
    border: 1px solid var(--menstrual);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .phase-alert b{ color: var(--menstrual); }
  .today-exercise{
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 22px;
  }
  .today-exercise .ex-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .today-exercise .ex-title{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    margin-bottom: 10px;
  }
  .ex-list{ margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.7; }
  .week-ex-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .week-ex-row.today-row{ color: var(--accent); font-weight: 500; }
  .week-ex-row .wd{ width: 70px; color: var(--text-muted); font-family:'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; }

  /* ---- Hogar ---- */
  .plant-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .plant-name{ font-family:'Fraunces', serif; font-style: italic; font-size: 15px; margin-bottom: 4px; }
  .plant-water{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .plant-desc{ font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  /* ---- Learning ---- */
  .chunk-chip{
    display:inline-block;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12.5px;
    margin: 3px 4px 0 0;
    font-family:'JetBrains Mono', monospace;
  }
  .stage-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .stage-title{ font-family:'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--accent); margin-bottom: 4px; }

  /* ---- Finanzas ---- */
  .fin-summary{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin: 14px 0;
  }
  @media (max-width: 520px){ .fin-summary{ grid-template-columns: repeat(2, 1fr); } }
  .fin-stat{
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .fin-stat .fin-label{ font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .fin-stat .fin-value{ font-family:'Fraunces', serif; font-size: 18px; margin-top: 4px; }
  .pocket-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .pocket-head{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .pocket-title{ font-family:'Fraunces', serif; font-style: italic; font-size: 18px; }
  .pocket-available{ font-family:'JetBrains Mono', monospace; font-size: 15px; color: var(--accent); }
  .debt-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .debt-name{ font-family:'Fraunces', serif; font-style: italic; font-size: 16px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="currentColor" stroke-width="1.1">
        <g transform="translate(26,28)">
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(45)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(90)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(135)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(180)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(225)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(270)"/>
          <path d="M0,0 C-2.6,-7 -2.6,-13.5 0,-19 C2.6,-13.5 2.6,-7 0,0 Z" transform="rotate(315)"/>
          <circle cx="0" cy="0" r="1.6" fill="currentColor" stroke="none"/>
        </g>
        <path d="M47,12 C47.3,15 48,15.7 51,16 C48,16.3 47.3,17 47,20 C46.7,17 46,16.3 43,16 C46,15.7 46.7,15 47,12 Z" fill="currentColor" stroke="none"/>
        <path d="M11,42 C11.2,44 11.6,44.4 13.5,44.6 C11.6,44.8 11.2,45.2 11,47.2 C10.8,45.2 10.4,44.8 8.5,44.6 C10.4,44.4 10.8,44 11,42 Z" fill="currentColor" stroke="none"/>
        <path d="M9,10 C9.15,11.3 9.4,11.55 10.6,11.7 C9.4,11.85 9.15,12.1 9,13.4 C8.85,12.1 8.6,11.85 7.4,11.7 C8.6,11.55 8.85,11.3 9,10 Z" fill="currentColor" stroke="none"/>
      </g>
    </svg>
    <h1>Loren's life</h1>
  </div>

  <div class="nav">
    <button class="active" id="tab-daily">Daily</button>
    <button id="tab-rituales">Rituales</button>
    <button id="tab-nutricion">Nutrición</button>
    <button id="tab-ejercicio">Ejercicio</button>
    <button id="tab-hogar">Hogar</button>
    <button id="tab-learning">Learning</button>
    <button id="tab-finanzas">Finanzas</button>
  </div>

  <div id="app">
    <div class="loading">Cargando tu ciclo…</div>
  </div>

</div>

  <div class="modal">
